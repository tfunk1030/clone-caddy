name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Structure check
        run: npm run lint
      - name: Production build
        run: npm run build
      - name: Verify build output
        run: test -f dist/index.html && test -f dist/play_tab.html
