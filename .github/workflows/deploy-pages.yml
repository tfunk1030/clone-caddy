name: Deploy to GitHub Pages

# A keyless static deploy target. The conditions widget automatically falls back
# to calling the public weather/geo services directly when no /api backend is
# present, so the full app works on Pages. For the optimized serverless API,
# deploy to Vercel instead (see README).
#
# To enable: repo Settings → Pages → Source → "GitHub Actions". Then this runs
# on every push to main (or manually via "Run workflow").

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Build (with Pages base path)
        run: VITE_BASE="/${GITHUB_REPOSITORY#*/}/" npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
