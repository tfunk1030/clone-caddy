<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#F5F5F5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000a14" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="CADD-AI brings advanced golf course analysis with 3D visualization, Expected Strokes calculations, and shot optimization for golfers and strategists." />
    <title>CADD-AI - Professional Course Analysis Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23000a14'/%3E%3Cg fill='none' stroke='%2310d98a' stroke-width='1.5'%3E%3Ccircle cx='16' cy='16' r='3.5'/%3E%3Ccircle cx='16' cy='16' r='7'/%3E%3Ccircle cx='16' cy='16' r='10.5'/%3E%3C/g%3E%3C/svg%3E" />
    <script>
      // Apply the saved theme before paint (avoids a flash). ThemeProvider then
      // manages the `dark` class on <html>.
      try {
        var t = localStorage.getItem('caddai.theme') || 'dark';
        var dark = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      } catch (e) { document.documentElement.classList.add('dark'); }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
